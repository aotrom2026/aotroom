<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111111">
    <meta name="description" content="ALYA — персонаж AOTROOM.">
    <title>ALYA — AOTROOM</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body class="character-page">
    <main>
      <section class="character-hero" aria-labelledby="character-title">
        <img class="character-hero__image" src="../assets/characters/alya.jpg" alt="ALYA">
        <div class="character-hero__veil" aria-hidden="true"></div>
        <a class="mark character-hero__mark" href="../" aria-label="Вернуться на главную AOTROOM">
          <img src="../assets/logo-small.png" alt="AOTROOM">
        </a>
        <a class="character-hero__back" href="../">← назад</a>
        <div class="character-hero__title">
          <p>02 / персонаж</p>
          <h1 id="character-title">ALYA</h1>
        </div>
      </section>

      <section class="character-works section" aria-labelledby="works-title">
        <p class="section__kicker">работы / ALYA</p>
        <h2 id="works-title">все работы</h2>
        <p class="character-works__empty">Здесь появятся работы с ALYA.</p>
      </section>
    </main>

    <footer class="footer">
      <img class="footer__logo" src="../assets/logo-main.png" alt="AOTROOM">
      <span>2026</span>
    </footer>
  </body>
</html>
