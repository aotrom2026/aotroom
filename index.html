<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111111">
    <meta name="description" content="aotrom — музыка автора.">
    <title>aotrom — музыка автора</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <section id="hero" class="hero" aria-label="aotrom">
        <picture class="hero__image-wrap">
          <source media="(max-width: 700px)" srcset="assets/hero-mobile.jpg">
          <img class="hero__image" src="assets/hero-desktop.jpg" alt="Портрет автора aotrom" fetchpriority="high">
        </picture>
        <div class="hero__veil" aria-hidden="true"></div>

        <a class="mark" href="#hero" aria-label="aotrom, на главную">
          <img src="assets/aotrom-logo.png" alt="aotrom">
        </a>
        <nav class="hero__nav" aria-label="Основная навигация">
          <a href="#about">кто я</a>
          <a href="#releases">работы</a>
          <a href="#contact">связь</a>
          <a href="#portfolio">портфолио</a>
        </nav>

        <div class="hero__bottom">
          <p>музыка автора</p>
          <a href="#releases" class="hero__discover">слушать <span aria-hidden="true">↓</span></a>
        </div>
      </section>

      <section id="about" class="about section">
        <p class="section__kicker">01 / кто я</p>
        <div class="about__copy">
          <img class="about__logo" src="assets/aotrom-logo.png" alt="aotrom">
          <p>музыка, которая только ищет свои слова.</p>
        </div>
        <p class="about__note">Здесь скоро появится история автора.</p>
      </section>

      <section id="releases" class="releases section" aria-labelledby="releases-title">
        <div class="section__heading">
          <p class="section__kicker">02 / работы</p>
          <h2 id="releases-title">артисты<br>и проекты</h2>
        </div>
        <div id="release-list" class="release-list" aria-live="polite"></div>
      </section>

      <section id="portfolio" class="portfolio section" aria-labelledby="portfolio-title">
        <div class="portfolio__intro">
          <p class="section__kicker">03 / портфолио</p>
          <h2 id="portfolio-title">полный цикл<br>продакшена</h2>
        </div>
        <div id="portfolio-groups" class="portfolio-groups"></div>
      </section>

      <section id="all" class="gallery" aria-label="Фотографии автора">
        <figure class="gallery__image gallery__image--tall">
          <img src="assets/gallery/dsc02514.jpg" alt="Чёрно-белый портрет автора в полосатой футболке" loading="lazy">
        </figure>
        <figure class="gallery__image gallery__image--tall">
          <img src="assets/gallery/img-2194.jpg" alt="Чёрно-белый портрет автора" loading="lazy">
        </figure>
      </section>

      <section id="contact" class="contact section">
        <p class="section__kicker">04 / связь</p>
        <div class="contact__content">
          <h2>будь на связи</h2>
          <p>ссылки на музыку и соцсети появятся здесь.</p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <img class="footer__logo" src="assets/aotrom-logo.png" alt="aotrom">
      <span>2026</span>
    </footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
